<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repetition is a form of change</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --ink: #f0ece0;
    --accent: #f0ece0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    cursor: crosshair;
    position: relative;
  }

  /* canvas behind everything */
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* center UI */
  .stage {
    position: relative;
    z-index: 10;
    text-align: center;
    user-select: none;
    pointer-events: none;
  }

  .main-text {
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    line-height: 1.15;
    letter-spacing: -0.01em;
    transition: color 0.8s ease, text-shadow 0.8s ease;
  }

  .main-text span {
    display: block;
  }

  /* ripple rings */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(240,236,224,0.6);
    pointer-events: none;
    z-index: 5;
    transform: scale(0);
    animation: rippleOut 2.2s ease-out forwards;
  }
  @keyframes rippleOut {
    0%   { transform: scale(0);   opacity: 0.7; }
    100% { transform: scale(1);   opacity: 0; }
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="stage">
  <div class="main-text" id="mainText">
    <span>Repetition</span>
    <span>is a form</span>
    <span>of change.</span>
  </div>
</div>

<script>
  // ── state ──
  let clicks = 0;
  let hue = 0;

  // ── canvas lines ──
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const lines = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawLines() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    lines.forEach((l, i) => {
      l.life -= 0.004;
      if (l.life <= 0) { lines.splice(i, 1); return; }
      ctx.beginPath();
      ctx.moveTo(l.x1, l.y1);
      ctx.lineTo(l.x2, l.y2);
      ctx.strokeStyle = `hsla(${l.hue}, ${l.sat}%, ${l.light}%, ${l.life * 0.5})`;
      ctx.lineWidth = l.width * l.life;
      ctx.stroke();
    });
    requestAnimationFrame(drawLines);
  }
  drawLines();

// ── color palettes that shift with each click cluster ──
  const palettes = [
    { bg: '#0a0a0a', ink: '#f0ece0', h: 45,  s: 20,  l: 88 },
    { bg: '#0d0a14', ink: '#e8deff', h: 260, s: 60,  l: 85 },
    { bg: '#0a100a', ink: '#d4f5d4', h: 120, s: 40,  l: 80 },
    { bg: '#140a0a', ink: '#ffd6d6', h: 0,   s: 60,  l: 85 },
    { bg: '#0a0e14', ink: '#d6eeff', h: 210, s: 60,  l: 85 },
    { bg: '#14100a', ink: '#fff3d6', h: 40,  s: 80,  l: 85 },
  ];
  let paletteIdx = 0;

  function applyPalette(p) {
    document.body.style.transition = 'background 1.5s ease';
    document.body.style.background = p.bg;
    document.getElementById('mainText').style.color = p.ink;
    document.getElementById('mainText').style.textShadow =
      `0 0 80px hsla(${p.h}, ${p.s}%, ${p.l}%, 0.15)`;
  }

  // ── event listener: click ──
  document.addEventListener('click', (e) => {
    clicks++;
    hue = (hue + 13) % 360;

    // shift palette every 5 clicks
    if (clicks % 5 === 0) {
      paletteIdx = (paletteIdx + 1) % palettes.length;
      applyPalette(palettes[paletteIdx]);
    }

    // ripple rings (3 expanding at slightly different sizes)
    for (let r = 0; r < 3; r++) {
      const ring = document.createElement('div');
      ring.className = 'ripple';
      const size = 60 + r * 80 + Math.random() * 40;
      ring.style.cssText = `
        width:${size}px; height:${size}px;
        left:${e.clientX - size/2}px;
        top:${e.clientY - size/2}px;
        border-color: hsla(${hue + r*30}, 40%, 80%, 0.5);
        animation-delay: ${r * 0.12}s;
        animation-duration: ${1.8 + r * 0.5}s;
      `;
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 3000);
    }



    // draw lines radiating from click
    const numLines = 4 + Math.floor(clicks / 8);
    for (let i = 0; i < Math.min(numLines, 14); i++) {
      const angle = (Math.PI * 2 / numLines) * i + Math.random() * 0.3;
      const len   = 60 + Math.random() * 200;
      lines.push({
        x1: e.clientX, y1: e.clientY,
        x2: e.clientX + Math.cos(angle) * len,
        y2: e.clientY + Math.sin(angle) * len,
        hue: hue + i * 10,
        sat: 20 + clicks % 40,
        light: 75,
        width: 0.5 + Math.random() * 1.5,
        life: 1,
      });
    }
  });

  // ── event listener: mousemove — subtle text distort ──
  let moveTimer;
  document.addEventListener('mousemove', (e) => {
    clearTimeout(moveTimer);
    const dx = (e.clientX / window.innerWidth  - 0.5) * 12;
    const dy = (e.clientY / window.innerHeight - 0.5) * 6;
    document.getElementById('mainText').style.transform =
      `perspective(600px) rotateY(${dx}deg) rotateX(${-dy}deg)`;
    moveTimer = setTimeout(() => {
      document.getElementById('mainText').style.transform = 'none';
    }, 800);
  });

  // ── event listener: keydown — spacebar resets with a twist ──
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      clicks = 0;
      paletteIdx = (paletteIdx + 1) % palettes.length;
      applyPalette(palettes[paletteIdx]);
      lines.length = 0;
    }
  });

  // init palette
  applyPalette(palettes[0]);
</script>
</body>
</html>
