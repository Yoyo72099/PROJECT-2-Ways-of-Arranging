<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #fafaf8;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .scene { text-align: center; position: relative; }

  /* ====== 404 Number ====== */
  .number {
    font-family: 'Space Mono', monospace;
    font-size: clamp(100px, 20vw, 260px);
    font-weight: 700;
    color: transparent;
    -webkit-text-stroke: 1.5px #1a1a1a;
    line-height: 1;
    position: relative;
    display: inline-block;
    opacity: 0;
    animation: numReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  @keyframes numReveal {
    from { opacity: 0; transform: translateY(30px) scale(0.96); letter-spacing: -0.02em; }
    to   { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 0.06em; }
  }

  /* Strikethrough line */
  .number::after {
    content: '';
    position: absolute;
    top: 52%;
    left: -6%;
    width: 112%;
    height: 2px;
    background: #1a1a1a;
    transform: scaleX(0);
    transform-origin: left;
    animation: lineGrow 0.7s cubic-bezier(0.65, 0, 0.35, 1) 0.9s forwards;
  }

  @keyframes lineGrow { to { transform: scaleX(1); } }

  /* ====== Text ====== */
  .label {
    margin-top: 28px;
    font-size: clamp(11px, 1.4vw, 14px);
    font-weight: 300;
    color: #999;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.7s ease 1.3s forwards;
  }

  .desc {
    margin-top: 10px;
    font-size: clamp(12px, 1.3vw, 15px);
    font-weight: 300;
    color: #bbb;
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeIn 0.7s ease 1.5s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== Floating Dots ====== */
  .dots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
    background: #e8e6e2;
    animation: float var(--dur) ease-in-out infinite, appear 1s ease var(--delay) forwards;
    opacity: 0;
  }

  .dot:nth-child(1) { --dur:5s; --delay:0.4s; width:7px;  height:7px;  top:14%; left:11%; }
  .dot:nth-child(2) { --dur:7s; --delay:0.6s; width:11px; height:11px; top:22%; right:14%; }
  .dot:nth-child(3) { --dur:6s; --delay:0.9s; width:5px;  height:5px;  bottom:28%; left:18%; }
  .dot:nth-child(4) { --dur:8s; --delay:1.1s; width:9px;  height:9px;  bottom:18%; right:10%; }
  .dot:nth-child(5) { --dur:6s; --delay:1.3s; width:4px;  height:4px;  top:55%; left:6%; }
  .dot:nth-child(6) { --dur:7s; --delay:0.7s; width:6px;  height:6px;  top:70%; right:8%; }
  .dot:nth-child(7) { --dur:5s; --delay:1.5s; width:8px;  height:8px;  top:10%; left:45%; }
  .dot:nth-child(8) { --dur:9s; --delay:1.0s; width:5px;  height:5px;  bottom:10%; left:40%; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-18px); }
  }

  @keyframes appear { to { opacity: 0.45; } }

  /* ====== Blinking cursor ====== */
  .zero { position: relative; }

  .zero .cursor {
    position: absolute;
    right: -8px;
    top: 18%;
    width: 2px;
    height: 60%;
    background: #1a1a1a;
    animation: blink 1s step-end infinite 1.8s;
    opacity: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  /* ====== Responsive ====== */
  @media (max-width: 480px) {
    .label { letter-spacing: 0.12em; }
    .desc { padding: 0 20px; }
  }
</style>
</head>
<body>

  <div class="dots">
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>

  <div class="scene">
    <div class="number">4<span class="zero">0<span class="cursor"></span></span>4</div>
    <p class="label">Page not found</p>
    <p class="desc">The page you're looking for doesn't exist or has been moved.</p>
  </div>

</body>
</html>
