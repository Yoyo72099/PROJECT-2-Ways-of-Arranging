<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Escape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #e0ddd8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .canvas {
      position: relative;
      width: 500px;
      height: 600px;
      background-color: #a9bccf;
    }

    .left-outer {
      position: absolute;
      left: 0;
      bottom: 70px;
      width: 190px;
      height: 250px;
      border-left: 50px solid #e2e4e4;
     
      border-top: 50px solid #e2e4e4;
    }

    .right-outer {
      position: absolute;
      right: 0;
      bottom: 70px;
      width: 190px;
      height: 300px;
      
      border-right: 50px solid #7d8f9e;
      border-top: 50px solid #7d8f9e;
    }

  
    .black {
      position: absolute;
      width: 220px;
      height: 430px;
      background-color: #1c1c1c;
      left: 50%;
      transform: translateX(-50%);
      top: 55px;
    }

    .blue {
      position: absolute;
      width: 110px;
      height: 330px;
      background-color: #2a4ec2;
      left: 50%;
      transform: translateX(-50%);
      top: 105px;
    }


    .red-left {
      position: absolute;
      width: 45px;
      height: 310px;
      background-color: #e8213b;
      left: 50%;
      margin-left: -50px;
      top: 114px;
    }

 
    .blue-gap {
      position: absolute;
      width: 12px;
      height: 324px;
      background-color: #2a4ec2;
      left: 50%;
      margin-left: -6px;
      top: 108px;
    }
    .red-right {
      position: absolute;
      width: 45px;
      height: 310px;
      background-color: #e8213b;
      left: 50%;
      margin-left: 5px;
      top: 114px;
    }
    .yellow {
      position: absolute;
      width: 100%;
      height: 70px;
      background-color: #ffe600;
      bottom: 0;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="left-outer"></div>
    <div class="right-outer"></div>
    <div class="black"></div>
    <div class="blue"></div>
    <div class="red-left"></div>
    <div class="blue-gap"></div>
    <div class="red-right"></div>
    <div class="yellow"></div>
  </div>
</body>
</html>
